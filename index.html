<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ค้นหาอาหาร · 食物词典</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,400&family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F7F1E5;
    --paper-2: #F0E7D2;
    --ink: #1B1612;
    --ink-soft: #4A3F36;
    --muted: #8A7A66;
    --line: #D8C9A8;
    --vermillion: #B83A26;
    --vermillion-deep: #8E2A1A;
    --gold: #B68A2E;
    --jade: #4F7A5A;
    --shadow: 0 1px 0 rgba(27,22,18,0.04), 0 8px 24px -12px rgba(27,22,18,0.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "DM Sans", "IBM Plex Sans Thai", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(184,58,38,0.04), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(182,138,46,0.05), transparent 50%);
    min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 18px 100px; }
  /* ───── Header ───── */
  header {
    padding: 28px 0 16px;
    text-align: center;
    position: relative;
  }
  .seal {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px; height: 56px;
    background: var(--vermillion);
    color: #FFF6E5;
    font-family: "Noto Serif TC", "Songti SC", "Songti TC", "STSong", serif;
    font-size: 30px; font-weight: 700;
    border-radius: 6px;
    box-shadow: 0 2px 0 var(--vermillion-deep), 0 8px 20px -6px rgba(184,58,38,0.5);
    transform: rotate(-4deg);
    margin-bottom: 14px;
    letter-spacing: -2px;
  }
  h1 {
    font-family: "Fraunces", "Noto Serif TC", serif;
    font-weight: 400;
    font-size: 28px;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  h1 .cn {
    font-family: "Noto Serif TC", "Songti SC", serif;
    font-weight: 500;
    color: var(--vermillion);
    margin-left: 8px;
  }
  .subtitle {
    font-family: "IBM Plex Sans Thai", sans-serif;
    color: var(--muted);
    font-size: 13px;
    margin: 0;
    letter-spacing: 0.02em;
  }
  /* ───── Search ───── */
  .search-wrap {
    position: sticky;
    top: 0;
    z-index: 50;
    background: linear-gradient(to bottom, var(--paper) 70%, rgba(247,241,229,0));
    padding: 14px 0 18px;
    margin-bottom: 4px;
  }
  .search-box {
    position: relative;
    background: #FFFDF7;
    border: 1.5px solid var(--line);
    border-radius: 14px;
    box-shadow: var(--shadow);
    transition: border-color .2s, box-shadow .2s;
  }
  .search-box:focus-within {
    border-color: var(--vermillion);
    box-shadow: 0 0 0 4px rgba(184,58,38,0.12), var(--shadow);
  }
  #q {
    width: 100%;
    border: 0;
    outline: 0;
    background: transparent;
    padding: 16px 50px 16px 48px;
    font-size: 17px;
    font-family: "IBM Plex Sans Thai", "DM Sans", sans-serif;
    color: var(--ink);
    border-radius: 14px;
  }
  #q::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--vermillion);
    pointer-events: none;
  }
  .clear-btn {
    position: absolute;
    right: 10px; top: 50%; transform: translateY(-50%);
    background: var(--paper-2);
    border: 0;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    font-size: 14px;
  }
  .clear-btn.show { display: flex; }
  /* ───── Category tabs ───── */
  .cats {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 0 6px;
    margin: 0 -18px 14px;
    padding-left: 18px;
    padding-right: 18px;
    scrollbar-width: none;
  }
  .cats::-webkit-scrollbar { display: none; }
  .cat {
    flex-shrink: 0;
    font-family: "IBM Plex Sans Thai", sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: transparent;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .cat:hover { border-color: var(--vermillion); color: var(--vermillion); }
  .cat.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  /* ───── Results ───── */
  .result-count {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 13px;
    color: var(--muted);
    margin: 4px 4px 14px;
    letter-spacing: 0.02em;
  }
  .results { display: grid; gap: 10px; }
  .card {
    background: #FFFDF7;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: center;
    transition: transform .15s, box-shadow .15s, border-color .15s;
  }
  .card:hover {
    border-color: var(--vermillion);
    box-shadow: var(--shadow);
  }
  .card-text { min-width: 0; }
  .thai-name {
    font-family: "IBM Plex Sans Thai", sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    margin: 0 0 6px;
    line-height: 1.3;
  }
  .chinese {
    font-family: "Noto Serif TC", "Songti SC", "Songti TC", "STSong", "SimSun", serif;
    font-size: 30px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.1;
    letter-spacing: 0.02em;
    margin: 0 0 4px;
    user-select: all;
    -webkit-user-select: all;
  }
  .pinyin {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 14px;
    color: var(--vermillion);
    margin: 0 0 2px;
    letter-spacing: 0.01em;
  }
  .english {
    font-family: "DM Sans", sans-serif;
    font-size: 12px;
    color: var(--muted);
    margin: 0;
    letter-spacing: 0.02em;
  }
  .copy-btn {
    flex-shrink: 0;
    background: var(--paper);
    border: 1.5px solid var(--line);
    color: var(--ink-soft);
    width: 44px; height: 44px;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    font-family: "IBM Plex Sans Thai", sans-serif;
  }
  .copy-btn:hover {
    background: var(--vermillion);
    border-color: var(--vermillion);
    color: #FFF6E5;
  }
  .copy-btn.copied {
    background: var(--jade);
    border-color: var(--jade);
    color: #F0F5E8;
  }
  .copy-btn svg { width: 18px; height: 18px; }
  /* ───── Empty state ───── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty .big {
    font-family: "Noto Serif TC", serif;
    font-size: 48px;
    color: var(--line);
    margin-bottom: 12px;
  }
  .empty p {
    font-family: "IBM Plex Sans Thai", sans-serif;
    font-size: 14px;
    margin: 4px 0;
  }
  /* ───── Toast ───── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: var(--paper);
    padding: 12px 20px;
    border-radius: 999px;
    font-family: "IBM Plex Sans Thai", sans-serif;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 10px 30px -10px rgba(0,0,0,0.4);
    opacity: 0;
    transition: all .3s cubic-bezier(.2,.8,.2,1);
    z-index: 100;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast .cn {
    font-family: "Noto Serif TC", serif;
    color: var(--gold);
    margin: 0 4px;
  }
  /* highlight match */
  mark {
    background: rgba(182,138,46,0.25);
    color: inherit;
    padding: 0 2px;
    border-radius: 3px;
  }
  /* footer */
  .ribbon {
    text-align: center;
    margin-top: 30px;
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .ribbon::before, .ribbon::after {
    content: "❦";
    margin: 0 10px;
    color: var(--vermillion);
    font-style: normal;
  }
  @media (max-width: 480px) {
    h1 { font-size: 24px; }
    .chinese { font-size: 26px; }
    .card { padding: 12px 14px; }
    .copy-btn { width: 40px; height: 40px; }
    .stats-btn { font-size: 11px; padding: 6px 10px; }
  }
  /* ───── Stats button ───── */
  .stats-btn {
    position: absolute;
    top: 24px;
    right: 0;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    padding: 7px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .15s ease;
  }
  .stats-btn:active { background: var(--paper-2); transform: scale(0.96); }
  .stats-btn .dot {
    width: 6px; height: 6px;
    background: var(--vermillion);
    border-radius: 50%;
    display: none;
  }
  .stats-btn .dot.on { display: inline-block; }
  /* ───── Modal ───── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(27,22,18,0.45);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
  }
  .modal-backdrop.show { opacity: 1; pointer-events: auto; }
  .modal {
    position: fixed;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%) scale(0.96);
    background: var(--paper);
    width: calc(100vw - 28px);
    max-width: 540px;
    max-height: 86vh;
    border-radius: 18px;
    z-index: 201;
    opacity: 0;
    pointer-events: none;
    transition: all .3s cubic-bezier(.2,.8,.2,1);
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 30px 80px -20px rgba(0,0,0,0.45);
  }
  .modal.show {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }
  .modal-head {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    background: var(--paper-2);
  }
  .modal-title {
    font-family: "Fraunces", serif;
    font-size: 17px;
    font-weight: 600;
    margin: 0;
    color: var(--ink);
  }
  .modal-title .cn {
    font-family: "Noto Serif TC", serif;
    color: var(--vermillion);
    margin-left: 6px;
    font-size: 14px;
  }
  .modal-close {
    background: transparent;
    border: 0;
    font-size: 18px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
  }
  .modal-tabs {
    display: flex;
    border-bottom: 1px solid var(--line);
    background: var(--paper);
  }
  .modal-tab {
    flex: 1;
    padding: 12px 8px;
    background: transparent;
    border: 0;
    font-family: inherit;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .15s ease;
  }
  .modal-tab.active {
    color: var(--ink);
    border-bottom-color: var(--vermillion);
    font-weight: 600;
  }
  .modal-body {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    border-bottom: 1px solid rgba(216,201,168,0.4);
  }
  .stat-row:last-child { border-bottom: 0; }
  .stat-rank {
    width: 22px;
    font-family: "Fraunces", serif;
    font-style: italic;
    color: var(--muted);
    font-size: 14px;
    text-align: center;
    flex-shrink: 0;
  }
  .stat-rank.top { color: var(--vermillion); font-weight: 700; font-style: normal; }
  .stat-text { flex: 1; min-width: 0; }
  .stat-cn {
    font-family: "Noto Serif TC", serif;
    font-size: 17px;
    color: var(--ink);
    margin: 0;
    line-height: 1.2;
  }
  .stat-thai {
    font-family: "IBM Plex Sans Thai", sans-serif;
    font-size: 12px;
    color: var(--ink-soft);
    margin: 3px 0 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .stat-thai .py { color: var(--muted); font-style: italic; font-family: "Fraunces", serif; }
  .stat-count {
    font-family: "Fraunces", serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--vermillion);
    flex-shrink: 0;
    text-align: right;
    line-height: 1;
  }
  .stat-count small {
    font-family: "DM Sans", sans-serif;
    font-size: 9px;
    font-weight: 500;
    color: var(--muted);
    display: block;
    text-align: right;
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .modal-foot {
    padding: 12px 16px;
    border-top: 1px solid var(--line);
    background: var(--paper-2);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .stats-summary {
    flex: 1;
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 11px;
    color: var(--muted);
    min-width: 100%;
    margin-bottom: 6px;
  }
  .modal-foot button {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    padding: 6px 14px;
    border-radius: 100px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    flex: 1;
  }
  .modal-foot button:active { background: var(--paper); }
  .modal-foot button.danger { color: var(--vermillion); border-color: rgba(184,58,38,0.4); }
  .stats-empty {
    padding: 50px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
  .stats-empty .big {
    font-family: "Noto Serif TC", serif;
    font-size: 56px;
    color: var(--line);
    margin-bottom: 14px;
    line-height: 1;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <button class="stats-btn" id="statsBtn" aria-label="usage statistics">
      <span class="dot" id="statsDot"></span>
      <span>สถิติ</span>
    </button>
    <div class="seal">食</div>
    <h1>ค้นหาอาหาร <span class="cn">食物词典</span></h1>
    <p class="subtitle">พิมพ์ภาษาไทย · ได้ตัวอักษรจีนเพื่อก๊อปไปใช้</p>
  </header>

  <div class="search-wrap">
    <div class="search-box">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><path d="m21 21-4.3-4.3"></path></svg>
      <input id="q" type="text" placeholder="ติ่มซำ, ก๋วยเตี๋ยว, เป็ดย่าง, ชานม..." autocomplete="off" autocapitalize="off" autocorrect="off">
      <button class="clear-btn" id="clearBtn" aria-label="clear">✕</button>
    </div>
    <div class="cats" id="cats"></div>
  </div>

  <div class="result-count" id="count"></div>
  <div class="results" id="results"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Stats Modal -->
<div class="modal-backdrop" id="statsBackdrop"></div>
<div class="modal" id="statsModal" role="dialog" aria-labelledby="statsTitle" aria-hidden="true">
  <div class="modal-head">
    <h3 class="modal-title" id="statsTitle">สถิติการใช้งาน <span class="cn">使用统计</span></h3>
    <button class="modal-close" id="statsClose" aria-label="close">✕</button>
  </div>
  <div class="modal-tabs">
    <button class="modal-tab active" data-tab="copies">ที่คัดลอกบ่อย · Copied</button>
    <button class="modal-tab" data-tab="views">ที่เจอบ่อย · Viewed</button>
  </div>
  <div class="modal-body" id="statsBody"></div>
  <div class="modal-foot">
    <div class="stats-summary" id="statsSummary">—</div>
    <button id="statsExport">Export JSON</button>
    <button id="statsReset" class="danger">Reset</button>
  </div>
</div>

<script>
/* ───── Stats tracking (localStorage) ───── */
const STATS_KEY = 'thaiCnFoodDict_v1';
let stats;
try {
  const raw = localStorage.getItem(STATS_KEY);
  stats = raw ? JSON.parse(raw) : null;
} catch(e) { stats = null; }
if (!stats || typeof stats !== 'object') {
  stats = { copies: {}, views: {}, totalCopies: 0, totalSearches: 0, since: Date.now() };
}
// migrate missing fields
stats.copies = stats.copies || {};
stats.views = stats.views || {};
stats.totalCopies = stats.totalCopies || 0;
stats.totalSearches = stats.totalSearches || 0;
stats.since = stats.since || Date.now();

let statsSaveTimer;
function saveStats() {
  clearTimeout(statsSaveTimer);
  statsSaveTimer = setTimeout(() => {
    try { localStorage.setItem(STATS_KEY, JSON.stringify(stats)); } catch(e) {}
  }, 250);
}

function trackCopy(cn) {
  if (!cn) return;
  stats.copies[cn] = (stats.copies[cn] || 0) + 1;
  stats.totalCopies++;
  saveStats();
  updateStatsDot();
}

let lastTrackedQuery = '';
function trackSearch(items, query) {
  if (!query || query === lastTrackedQuery) return;
  lastTrackedQuery = query;
  stats.totalSearches++;
  // track top 8 visible results per search
  items.slice(0, 8).forEach(d => {
    stats.views[d.cn] = (stats.views[d.cn] || 0) + 1;
  });
  saveStats();
}

function updateStatsDot() {
  const dot = document.getElementById('statsDot');
  if (dot) dot.classList.toggle('on', stats.totalCopies > 0);
}

/* ───── Dictionary ───── */
const DATA = [
  // ── ติ่มซำ / Dim Sum ──
  { thai: "ติ่มซำ", alt: ["ดิมซำ","dim sum"], cn: "点心", py: "diǎn xīn", en: "dim sum", cat: "dimsum" },
  { thai: "ฮะเก๋า", alt: ["ฮะเก่า","ฮะเกา","har gow"], cn: "虾饺", py: "xiā jiǎo", en: "shrimp dumpling", cat: "dimsum" },
  { thai: "ขนมจีบ", alt: ["siu mai","shumai"], cn: "烧卖", py: "shāo mài", en: "siu mai / pork dumpling", cat: "dimsum" },
  { thai: "ซาลาเปา", alt: ["บะจ่าง","baozi"], cn: "包子", py: "bāo zi", en: "steamed bun", cat: "dimsum" },
  { thai: "ซาลาเปาหมูแดง", alt: ["char siu bao"], cn: "叉烧包", py: "chā shāo bāo", en: "BBQ pork bun", cat: "dimsum" },
  { thai: "ซาลาเปาไส้ครีม", alt: ["ไส้คัสตาร์ด","custard bun"], cn: "奶黄包", py: "nǎi huáng bāo", en: "custard bun", cat: "dimsum" },
  { thai: "หมั่นโถว", alt: ["mantou"], cn: "馒头", py: "mán tou", en: "plain steamed bun", cat: "dimsum" },
  { thai: "ขนมกุยช่าย", alt: ["กุยช่าย"], cn: "韭菜饺", py: "jiǔ cài jiǎo", en: "chive dumpling", cat: "dimsum" },
  { thai: "ปอเปี๊ยะทอด", alt: ["ปอเปี๊ยะ","spring roll"], cn: "春卷", py: "chūn juǎn", en: "spring roll", cat: "dimsum" },
  { thai: "เกี๊ยวซ่า", alt: ["gyoza","potsticker"], cn: "锅贴", py: "guō tiē", en: "pan-fried dumpling", cat: "dimsum" },

/* ───── Search ───── */
const PINYIN_STRIP = { 'ā':'a','á':'a','ǎ':'a','à':'a','ē':'e','é':'e','ě':'e','è':'e','ī':'i','í':'i','ǐ':'i','ì':'i','ō':'o','ó':'o','ǒ':'o','ò':'o','ū':'u','ú':'u','ǔ':'u','ù':'u','ǖ':'v','ǘ':'v','ǚ':'v','ǜ':'v','ü':'v' };
function stripPinyin(s) { return s.replace(/[āáǎàēéěèīíǐìōóǒòūúǔùǖǘǚǜü]/g, c => PINYIN_STRIP[c] || c).toLowerCase(); }

// Strip Thai tone & vowel diacritics for loose matching
function normThai(s) {
  return s.toLowerCase().replace(/\s+/g,'').replace(/[\u0E47-\u0E4E\u0E30-\u0E3A]/g,'');
}
function isThai(s) { return /[\u0E00-\u0E7F]/.test(s); }

function levenshtein(a, b) {
  if (a === b) return 0;
  const la = a.length, lb = b.length;
  if (!la) return lb;
  if (!lb) return la;
  let prev = new Array(lb + 1);
  let curr = new Array(lb + 1);
  for (let j = 0; j <= lb; j++) prev[j] = j;
  for (let i = 1; i <= la; i++) {
    curr[0] = i;
    for (let j = 1; j <= lb; j++) {
      const cost = a.charCodeAt(i-1) === b.charCodeAt(j-1) ? 0 : 1;
      curr[j] = Math.min(curr[j-1] + 1, prev[j] + 1, prev[j-1] + cost);
    }
    [prev, curr] = [curr, prev];
  }
  return prev[lb];
}

function scoreItem(item, query) {
  if (!query) return 1;
  const isThaiQ = isThai(query);
  const qLow = query.toLowerCase().trim();
  const qThaiNorm = normThai(query);

  // Candidates: [string, weight, normalize-as-thai?]
  const cands = [];
  cands.push([item.thai, 1.00, true]);
  (item.alt || []).forEach(a => cands.push([a, 0.92, isThai(a)]));
  cands.push([item.en, 0.78, false]);
  cands.push([item.py, 0.78, false]);
  cands.push([stripPinyin(item.py), 0.78, false]);
  cands.push([item.cn, 1.00, false]);

  let best = 0;
  for (const [val, w, isThaiTarget] of cands) {
    if (!val) continue;
    const v = isThaiTarget ? normThai(val) : val.toLowerCase();
    const q = isThaiQ && isThaiTarget ? qThaiNorm : qLow;
    if (!q) continue;
    let s = 0;
    if (v === q) s = 100;
    else if (v.startsWith(q)) s = 92;
    else if (v.includes(q)) s = 80;
    else if (q.length >= 3) {
      const d = levenshtein(v, q);
      const ratio = 1 - d / Math.max(v.length, q.length);
      if (ratio > 0.55) s = ratio * 65;
    }
    s *= w;
    if (s > best) best = s;
  }
  return best;
}

function highlight(text, query) {
  if (!query || !text) return text;
  // Find a contiguous match (case insensitive). For Thai we don't strip diacritics in display.
  const lower = text.toLowerCase();
  const q = query.toLowerCase().trim();
  const idx = lower.indexOf(q);
  if (idx >= 0) {
    return text.slice(0,idx) + '<mark>' + text.slice(idx, idx+q.length) + '</mark>' + text.slice(idx+q.length);
  }
  return text;
}

/* ───── Render ───── */
let activeCat = "all";
let currentQuery = "";

function renderCats() {
  const wrap = document.getElementById('cats');
  wrap.innerHTML = '';
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat' + (c.id === activeCat ? ' active' : '');
    btn.innerHTML = `${c.th} <span style="opacity:.55; margin-left:4px; font-family: 'Noto Serif TC', serif;">${c.cn}</span>`;
    btn.onclick = () => { activeCat = c.id; renderCats(); renderResults(); };
    wrap.appendChild(btn);
  });
}

function renderResults() {
  const q = currentQuery.trim();
  const filtered = DATA.filter(d => activeCat === "all" || d.cat === activeCat);

  let scored;
  if (q) {
    scored = filtered.map(d => ({ d, s: scoreItem(d, q) }))
                     .filter(x => x.s > 0)
                     .sort((a,b) => b.s - a.s);
  } else {
    scored = filtered.map(d => ({ d, s: 1 }));
  }

  // track search-driven views
  if (q && scored.length > 0) {
    trackSearch(scored.map(x => x.d), q);
  }

  const countEl = document.getElementById('count');
  if (q) {
    countEl.textContent = scored.length === 0
      ? `ไม่พบ "${q}"`
      : `พบ ${scored.length} รายการ · "${q}"`;
  } else {
    countEl.textContent = `${scored.length} รายการ`;
  }

  const root = document.getElementById('results');
  if (scored.length === 0) {
    root.innerHTML = `
      <div class="empty">
        <div class="big">無</div>
        <p>ลองคำใกล้เคียง เช่น "ติ่ม", "บะหมี่", "เป็ด"</p>
        <p style="font-size:12px; margin-top:8px;">รองรับการพิมพ์ผิดเล็กน้อยและคำพ้องเสียง</p>
      </div>`;
    return;
  }

  root.innerHTML = scored.slice(0, 200).map(({d}) => `
    <div class="card">
      <div class="card-text">
        <p class="thai-name">${highlight(d.thai, q)}</p>
        <p class="chinese">${d.cn}</p>
        <p class="pinyin">${d.py}</p>
        <p class="english">${d.en}</p>
      </div>
      <button class="copy-btn" data-cn="${d.cn}" data-th="${d.thai}" aria-label="copy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
      </button>
    </div>
  `).join('');

  // wire up copy
  root.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const cn = btn.dataset.cn;
      const th = btn.dataset.th;
      try {
        await navigator.clipboard.writeText(cn);
      } catch {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = cn;
        ta.style.position = 'fixed'; ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch {}
        document.body.removeChild(ta);
      }
      trackCopy(cn);
      btn.classList.add('copied');
      // swap icon to checkmark briefly
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
      showToast(`คัดลอกแล้ว <span class="cn">${cn}</span>`);
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>';
      }, 1400);
    });
  });
}

let toastTimer;
function showToast(html) {
  const t = document.getElementById('toast');
  t.innerHTML = html;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

const q = document.getElementById('q');
const clearBtn = document.getElementById('clearBtn');
q.addEventListener('input', () => {
  currentQuery = q.value;
  clearBtn.classList.toggle('show', !!currentQuery);
  renderResults();
});
clearBtn.addEventListener('click', () => {
  q.value = ''; currentQuery = ''; clearBtn.classList.remove('show');
  q.focus(); renderResults();
});

renderCats();
renderResults();

/* ───── Stats Modal ───── */
let currentStatsTab = 'copies';

function renderStatsModal() {
  const data = currentStatsTab === 'copies' ? stats.copies : stats.views;
  const entries = Object.entries(data).sort((a,b) => b[1] - a[1]).slice(0, 50);
  const body = document.getElementById('statsBody');

  if (entries.length === 0) {
    body.innerHTML = `
      <div class="stats-empty">
        <div class="big">空</div>
        <p>${currentStatsTab === 'copies' ? 'ยังไม่มีการคัดลอก' : 'ยังไม่มีการค้นหา'}</p>
        <p style="font-size:11px; margin-top:6px; color: var(--muted);">เริ่มใช้งานเพื่อดูสถิติ · Start using to see stats</p>
      </div>`;
  } else {
    body.innerHTML = entries.map(([cn, count], i) => {
      const item = DATA.find(d => d.cn === cn);
      if (!item) return '';
      return `
        <div class="stat-row">
          <div class="stat-rank ${i < 3 ? 'top' : ''}">${i+1}</div>
          <div class="stat-text">
            <p class="stat-cn">${item.cn}</p>
            <p class="stat-thai">${item.thai} · <span class="py">${item.py}</span></p>
          </div>
          <div class="stat-count">${count}<small>${currentStatsTab === 'copies' ? 'copies' : 'views'}</small></div>
        </div>
      `;
    }).join('');
  }

  document.querySelectorAll('.modal-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === currentStatsTab);
  });

  const days = Math.max(1, Math.ceil((Date.now() - stats.since) / (24*3600*1000)));
  const uniqueCopied = Object.keys(stats.copies).length;
  document.getElementById('statsSummary').textContent =
    `${stats.totalCopies} copies · ${uniqueCopied} unique dish${uniqueCopied===1?'':'es'} · ${stats.totalSearches} searches · since ${days} day${days===1?'':'s'}`;
}

function openStats() {
  renderStatsModal();
  document.getElementById('statsBackdrop').classList.add('show');
  document.getElementById('statsModal').classList.add('show');
  document.getElementById('statsModal').setAttribute('aria-hidden', 'false');
}
function closeStats() {
  document.getElementById('statsBackdrop').classList.remove('show');
  document.getElementById('statsModal').classList.remove('show');
  document.getElementById('statsModal').setAttribute('aria-hidden', 'true');
}

document.getElementById('statsBtn').addEventListener('click', openStats);
document.getElementById('statsClose').addEventListener('click', closeStats);
document.getElementById('statsBackdrop').addEventListener('click', closeStats);
document.querySelectorAll('.modal-tab').forEach(t => {
  t.addEventListener('click', () => {
    currentStatsTab = t.dataset.tab;
    renderStatsModal();
  });
});
document.getElementById('statsReset').addEventListener('click', () => {
  if (!confirm('ล้างสถิติทั้งหมด? · Reset all stats?')) return;
  stats = { copies: {}, views: {}, totalCopies: 0, totalSearches: 0, since: Date.now() };
  saveStats();
  updateStatsDot();
  renderStatsModal();
});
document.getElementById('statsExport').addEventListener('click', () => {
  const exportData = {
    exportedAt: new Date().toISOString(),
    since: new Date(stats.since).toISOString(),
    totalCopies: stats.totalCopies,
    totalSearches: stats.totalSearches,
    copies: Object.entries(stats.copies)
      .sort((a,b) => b[1] - a[1])
      .map(([cn, count]) => {
        const item = DATA.find(d => d.cn === cn);
        return { cn, count, thai: item?.thai, py: item?.py, en: item?.en, cat: item?.cat };
      }),
    views: Object.entries(stats.views)
      .sort((a,b) => b[1] - a[1])
      .map(([cn, count]) => {
        const item = DATA.find(d => d.cn === cn);
        return { cn, count, thai: item?.thai, py: item?.py };
      })
  };
  const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `food-dict-stats-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// ESC to close
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('statsModal').classList.contains('show')) {
    closeStats();
  }
});

updateStatsDot();
</script>
